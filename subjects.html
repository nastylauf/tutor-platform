<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ✨ НОВОЕ: поддержка системной цветовой схемы -->
    <meta name="color-scheme" content="light dark" />
    <title>Предметы — TutorHub</title>
    <link rel="stylesheet" href="css/styles.css" />
    <!-- ✨ НОВОЕ: микро-скрипт для предотвращения мерцания темы при загрузке -->
    <script>
      (function () {
        const saved = localStorage.getItem('user-theme-preference');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && systemDark)) {
          document.documentElement.classList.add('theme_dark');
        }
      })();
    </script>
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="navbar-content">
          <div class="logo">
            <span class="logo-icon">📚</span>
            <span class="logo-text">TutorHub</span>
          </div>
          <ul class="nav-menu">
            <li><a href="index.html">Главная</a></li>
            <li><a href="tutors.html">Репетиторы</a></li>
            <li><a href="subjects.html" class="active">Предметы</a></li>
            <li><a href="profile.html">Кабинет</a></li>
          </ul>
          <div class="auth-buttons">
            <button class="btn-login">Вход</button>
            <button class="btn-signup">Регистрация</button>
          </div>
          <!-- ✨ НОВОЕ: Переключатель темы (БЭМ-блок theme-toggle) -->
          <button
            class="theme-toggle"
            type="button"
            aria-label="Переключить тему"
            data-theme-toggle
          >
            <span class="theme-toggle__icon theme-toggle__icon--light" aria-hidden="true">☀️</span>
            <span class="theme-toggle__icon theme-toggle__icon--dark" aria-hidden="true">🌙</span>
          </button>
        </div>
      </div>
    </nav>

    <section class="subjects-page">
      <div class="container">
        <h1>Все предметы</h1>
        <div id="subjectsGrid" class="subjects-grid">
          <!-- Заполняется через JS -->
        </div>
      </div>
    </section>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
