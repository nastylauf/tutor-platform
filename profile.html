<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Личный кабинет — TutorHub</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Навигация -->
    <nav class="navbar">
      <div class="container">
        <div class="navbar-content">
          <div class="logo">
            <span class="logo-icon">📚</span>
            <span class="logo-text">TutorHub</span>
          </div>
          <ul class="nav-menu">
            <li><a href="index.html">Главная</a></li>
            <li><a href="tutors.html">Репетиторы</a></li>
            <li><a href="subjects.html">Предметы</a></li>
            <li><a href="profile.html" class="active">Кабинет</a></li>
          </ul>
          <div class="auth-buttons">
            <button class="btn-login">Выйти</button>
          </div>
        </div>
      </div>
    </nav>

    <section class="profile-page">
      <div class="container">
        <div class="profile-header">
          <div class="profile-avatar" id="profileAvatar">👩‍🎓</div>
          <div class="profile-info">
            <div class="profile-name-container">
              <h1 id="profileName">Анна Иванова</h1>
              <button class="btn-edit-profile" id="editProfileBtn">✏️ Редактировать</button>
            </div>
            <p id="profileDetails">Студентка • 2 курс • Москва</p>
          </div>
        </div>

        <!-- Модальное окно редактирования профиля -->
        <div id="editProfileModal" class="modal hidden">
          <div class="modal-content">
            <div class="modal-header">
              <h2>Редактирование профиля</h2>
              <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
              <div class="form-group">
                <label for="editName">Имя</label>
                <input type="text" id="editName" class="form-input" placeholder="Введите имя" />
              </div>
              <div class="form-group">
                <label for="editSurname">Фамилия</label>
                <input
                  type="text"
                  id="editSurname"
                  class="form-input"
                  placeholder="Введите фамилию"
                />
              </div>
              <div class="form-group">
                <label for="editRole">Роль</label>
                <select id="editRole" class="form-input">
                  <option value="Студент">Студент</option>
                  <option value="Студентка">Студентка</option>
                  <option value="Ученик">Ученик</option>
                  <option value="Ученица">Ученица</option>
                </select>
              </div>
              <div class="form-group">
                <label for="editCourse">Курс/Класс</label>
                <input
                  type="text"
                  id="editCourse"
                  class="form-input"
                  placeholder="Например: 2 курс"
                />
              </div>
              <div class="form-group">
                <label for="editCity">Город</label>
                <input type="text" id="editCity" class="form-input" placeholder="Введите город" />
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn-cancel" id="cancelEditBtn">Отмена</button>
              <button class="btn-save" id="saveProfileBtn">Сохранить</button>
            </div>
          </div>
        </div>

        <div class="profile-content">
          <!-- Содержимое вкладок -->
          <div id="upcomingTab" class="tab-content">
            <h2>Предстоящие занятия</h2>
            <div id="upcomingLessons" class="lessons-list">
              <!-- Заполняется JS -->
            </div>
          </div>

          <div id="historyTab" class="tab-content hidden">
            <h2>История занятий</h2>
            <div id="historyLessons" class="lessons-list">
              <!-- Заполняется JS -->
            </div>
          </div>

          <div id="favoritesTab" class="tab-content hidden">
            <h2>Избранные репетиторы</h2>
            <div id="favoritesList" class="tutors-grid">
              <!-- Заполняется JS -->
            </div>
          </div>
        </div>
      </div>
    </section>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
